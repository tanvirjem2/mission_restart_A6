<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCart</title>

    <!-- Add Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- link css -->
    <link rel="stylesheet" href="style.css">

    <!-- link DaisyUI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <header>

        <!-- Navbar Container -->
        <div class="navbar p-5 w-4/5 mx-auto">

            <!-- Start Navbar (Left side: Logo + Mobile Menu) -->
            <div class="navbar-start">

                <!-- Dropdown for Mobile Menu -->
                <div class="dropdown">
                    <!-- Hamburger Button (Visible only on small devices, hidden on lg+) -->
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>

                    <!-- Mobile Menu Items (Dropdown Content) -->
                    <ul class="menu menu-sm dropdown-content bg-base-100 rounded-box z-10 mt-3 w-52 p-2 shadow">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="products.html">Products</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>

                <!-- Logo -->
                <a href="index.html" class="text-xl text-primary font-bold">SwiftCart</a>
            </div>

            <!-- Center Navbar (Visible only on large devices: lg+) -->
            <div class="navbar-center hidden lg:flex">
                <ul class="menu menu-horizontal px-1">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>

            <!-- End Navbar (Right side: Cart Icon) -->
            <div class="navbar-end">
                <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>

        </div>

        <!-- Banner / Hero Section -->
        <section>
            <!-- Hero Container with Background Image -->
            <div class="hero" style="background-image: url(./Assets/banner-image.png);">

                <!-- Overlay to darken or style the background -->
                <div class="hero-overlay bg-black/60"></div>

                <!-- Hero Content -->
                <div class="hero-content text-neutral-content">
                    <!-- Inner Content Wrapper with vertical padding -->
                    <div class="py-40 text-center lg:text-left">
                        <!-- Banner Heading -->
                        <h1 class="mb-5 text-5xl font-bold">
                            Best Collection For You
                        </h1>

                        <!-- Banner Description -->
                        <!-- Banner Description (Responsive) -->
                        <p class="mb-5 w-full sm:w-4/5 md:w-3/4 lg:w-2/3 text-center lg:text-left mx-auto lg:mx-0">
                            Discover the latest trends in fashion, electronics, and more. Shop with confidence and style
                            at SwiftCart.
                        </p>

                        <!-- Call-to-Action Button -->
                        <button class="btn btn-primary">Shop Now</button>
                    </div>
                </div>
            </div>
        </section>

    </header>

</body>

</html>
